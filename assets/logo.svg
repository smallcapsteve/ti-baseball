<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-label="TI Baseball — Tools of Ignorance">
  <defs>
    <clipPath id="ballL"><circle cx="195" cy="320" r="105"/></clipPath>
    <clipPath id="ballR"><circle cx="525" cy="320" r="105"/></clipPath>
  </defs>

  <!-- Black rounded shield background -->
  <rect x="0" y="0" width="720" height="720" rx="60" fill="#0A0A0A"/>

  <!-- Outer teal ring -->
  <circle cx="360" cy="360" r="290" fill="none" stroke="#1FBFC4" stroke-width="10"/>
  <!-- Inner pink ring -->
  <circle cx="360" cy="360" r="270" fill="none" stroke="#EC2C8A" stroke-width="4"/>

  <!-- Shield outline (diamond-like home plate at bottom) -->
  <path d="M 110 230
           L 610 230
           L 610 440
           L 360 620
           L 110 440 Z"
        fill="none" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 110 230
           L 610 230
           L 610 440
           L 360 620
           L 110 440 Z"
        fill="none" stroke="#EC2C8A" stroke-width="2" stroke-linejoin="round"
        transform="translate(3 3)"/>

  <!-- Left baseball (line-art) -->
  <g clip-path="url(#ballL)">
    <circle cx="195" cy="320" r="105" fill="none" stroke="#EC2C8A" stroke-width="5"/>
    <path d="M 100 270 Q 195 310 290 270" fill="none" stroke="#EC2C8A" stroke-width="4"/>
    <path d="M 100 370 Q 195 330 290 370" fill="none" stroke="#EC2C8A" stroke-width="4"/>
    <g stroke="#EC2C8A" stroke-width="3" stroke-linecap="round">
      <line x1="110" y1="262" x2="120" y2="252"/>
      <line x1="130" y1="270" x2="140" y2="260"/>
      <line x1="150" y1="278" x2="160" y2="268"/>
      <line x1="170" y1="284" x2="180" y2="274"/>
      <line x1="195" y1="287" x2="205" y2="277"/>
      <line x1="220" y1="284" x2="230" y2="274"/>
      <line x1="240" y1="278" x2="250" y2="268"/>
      <line x1="260" y1="270" x2="270" y2="260"/>

      <line x1="110" y1="378" x2="120" y2="388"/>
      <line x1="130" y1="370" x2="140" y2="380"/>
      <line x1="150" y1="362" x2="160" y2="372"/>
      <line x1="170" y1="356" x2="180" y2="366"/>
      <line x1="195" y1="353" x2="205" y2="363"/>
      <line x1="220" y1="356" x2="230" y2="366"/>
      <line x1="240" y1="362" x2="250" y2="372"/>
      <line x1="260" y1="370" x2="270" y2="380"/>
    </g>
  </g>
  <circle cx="195" cy="320" r="105" fill="none" stroke="#fff" stroke-width="3"/>

  <!-- Right baseball (line-art) -->
  <g clip-path="url(#ballR)">
    <circle cx="525" cy="320" r="105" fill="none" stroke="#EC2C8A" stroke-width="5"/>
    <path d="M 430 270 Q 525 310 620 270" fill="none" stroke="#EC2C8A" stroke-width="4"/>
    <path d="M 430 370 Q 525 330 620 370" fill="none" stroke="#EC2C8A" stroke-width="4"/>
    <g stroke="#EC2C8A" stroke-width="3" stroke-linecap="round">
      <line x1="440" y1="262" x2="450" y2="252"/>
      <line x1="460" y1="270" x2="470" y2="260"/>
      <line x1="480" y1="278" x2="490" y2="268"/>
      <line x1="500" y1="284" x2="510" y2="274"/>
      <line x1="525" y1="287" x2="535" y2="277"/>
      <line x1="550" y1="284" x2="560" y2="274"/>
      <line x1="570" y1="278" x2="580" y2="268"/>
      <line x1="590" y1="270" x2="600" y2="260"/>

      <line x1="440" y1="378" x2="450" y2="388"/>
      <line x1="460" y1="370" x2="470" y2="380"/>
      <line x1="480" y1="362" x2="490" y2="372"/>
      <line x1="500" y1="356" x2="510" y2="366"/>
      <line x1="525" y1="353" x2="535" y2="363"/>
      <line x1="550" y1="356" x2="560" y2="366"/>
      <line x1="570" y1="362" x2="580" y2="372"/>
      <line x1="590" y1="370" x2="600" y2="380"/>
    </g>
  </g>
  <circle cx="525" cy="320" r="105" fill="none" stroke="#fff" stroke-width="3"/>

  <!-- T letter (white with pink+teal accents) -->
  <g transform="translate(180 180)">
    <!-- pink offset shadow -->
    <path d="M 8 8 L 218 8 L 218 60 L 145 60 L 145 270 L 75 270 L 75 60 L 8 60 Z" fill="#EC2C8A"/>
    <!-- teal underlay -->
    <path d="M 4 4 L 214 4 L 214 56 L 141 56 L 141 266 L 71 266 L 71 56 L 4 56 Z" fill="#1FBFC4"/>
    <!-- main white -->
    <path d="M 0 0 L 210 0 L 210 52 L 137 52 L 137 262 L 67 262 L 67 52 L 0 52 Z"
          fill="#fff" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- I letter (teal with pink accent) -->
  <g transform="translate(395 220)">
    <!-- pink offset shadow -->
    <path d="M 8 8 L 138 8 L 138 240 L 8 240 Z" fill="#EC2C8A"/>
    <!-- main teal -->
    <path d="M 0 0 L 130 0 L 130 232 L 0 232 Z"
          fill="#1FBFC4" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round"/>
    <!-- small pink edge highlight -->
    <path d="M 0 0 L 130 0 L 130 232 L 0 232 Z"
          fill="none" stroke="#EC2C8A" stroke-width="1.5" stroke-linejoin="round"
          transform="translate(2 2)"/>
  </g>

  <!-- Small star (home plate marker) -->
  <g transform="translate(360 560)" fill="#EC2C8A">
    <polygon points="0,-16 4,-5 16,-5 6,3 10,15 0,8 -10,15 -6,3 -16,-5 -4,-5"/>
  </g>

  <!-- BASEBALL banner -->
  <g transform="translate(360 670)">
    <!-- pink top tick line -->
    <rect x="-260" y="-32" width="80" height="6" fill="#EC2C8A"/>
    <rect x="180" y="-32" width="80" height="6" fill="#EC2C8A"/>
    <!-- main word -->
    <text x="0" y="0" text-anchor="middle"
          font-family="Impact, 'Arial Black', 'Anton', sans-serif"
          font-size="62" font-weight="900" fill="#fff" letter-spacing="6">BASEBALL</text>
    <!-- teal bottom tick line -->
    <rect x="-260" y="14" width="80" height="6" fill="#1FBFC4"/>
    <rect x="180" y="14" width="80" height="6" fill="#1FBFC4"/>
    <!-- sub line -->
    <text x="0" y="34" text-anchor="middle"
          font-family="Impact, 'Arial Black', 'Anton', sans-serif"
          font-size="18" fill="#EC2C8A" letter-spacing="6">TOOLS OF IGNORANCE</text>
  </g>
</svg>
