<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-label="TI Baseball — Teams of Ignorance">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="360" cy="310" r="265"/>
    </clipPath>
  </defs>

  <!-- black rounded background -->
  <rect x="0" y="0" width="720" height="720" rx="50" fill="#0A0A0A"/>

  <!-- outer teal circle -->
  <circle cx="360" cy="310" r="275" fill="none" stroke="#1FBFC4" stroke-width="11"/>
  <!-- inner pink ring -->
  <circle cx="360" cy="310" r="260" fill="none" stroke="#EC2C8A" stroke-width="3"/>

  <!-- left baseball (pink line-art only, clipped to circle) -->
  <g clip-path="url(#circle-clip)">
    <g transform="translate(170 310)">
      <circle r="115" fill="none" stroke="#EC2C8A" stroke-width="6"/>
      <path d="M -100 -55 Q 0 -15 100 -55" fill="none" stroke="#EC2C8A" stroke-width="5"/>
      <path d="M -100 55 Q 0 15 100 55" fill="none" stroke="#EC2C8A" stroke-width="5"/>
      <g stroke="#EC2C8A" stroke-width="4" stroke-linecap="round">
        <line x1="-95" y1="-46" x2="-83" y2="-34"/>
        <line x1="-77" y1="-52" x2="-65" y2="-40"/>
        <line x1="-55" y1="-56" x2="-43" y2="-44"/>
        <line x1="-30" y1="-58" x2="-18" y2="-46"/>
        <line x1="-5" y1="-58" x2="7" y2="-46"/>
        <line x1="20" y1="-56" x2="32" y2="-44"/>
        <line x1="45" y1="-52" x2="57" y2="-40"/>
        <line x1="68" y1="-46" x2="80" y2="-34"/>
        <line x1="-95" y1="46" x2="-83" y2="34"/>
        <line x1="-77" y1="52" x2="-65" y2="40"/>
        <line x1="-55" y1="56" x2="-43" y2="44"/>
        <line x1="-30" y1="58" x2="-18" y2="46"/>
        <line x1="-5" y1="58" x2="7" y2="46"/>
        <line x1="20" y1="56" x2="32" y2="44"/>
        <line x1="45" y1="52" x2="57" y2="40"/>
        <line x1="68" y1="46" x2="80" y2="34"/>
      </g>
    </g>
  </g>

  <!-- right baseball (pink line-art only, clipped to circle) -->
  <g clip-path="url(#circle-clip)">
    <g transform="translate(550 310)">
      <circle r="115" fill="none" stroke="#EC2C8A" stroke-width="6"/>
      <path d="M -100 -55 Q 0 -15 100 -55" fill="none" stroke="#EC2C8A" stroke-width="5"/>
      <path d="M -100 55 Q 0 15 100 55" fill="none" stroke="#EC2C8A" stroke-width="5"/>
      <g stroke="#EC2C8A" stroke-width="4" stroke-linecap="round">
        <line x1="-95" y1="-46" x2="-83" y2="-34"/>
        <line x1="-77" y1="-52" x2="-65" y2="-40"/>
        <line x1="-55" y1="-56" x2="-43" y2="-44"/>
        <line x1="-30" y1="-58" x2="-18" y2="-46"/>
        <line x1="-5" y1="-58" x2="7" y2="-46"/>
        <line x1="20" y1="-56" x2="32" y2="-44"/>
        <line x1="45" y1="-52" x2="57" y2="-40"/>
        <line x1="68" y1="-46" x2="80" y2="-34"/>
        <line x1="-95" y1="46" x2="-83" y2="34"/>
        <line x1="-77" y1="52" x2="-65" y2="40"/>
        <line x1="-55" y1="56" x2="-43" y2="44"/>
        <line x1="-30" y1="58" x2="-18" y2="46"/>
        <line x1="-5" y1="58" x2="7" y2="46"/>
        <line x1="20" y1="56" x2="32" y2="44"/>
        <line x1="45" y1="52" x2="57" y2="40"/>
        <line x1="68" y1="46" x2="80" y2="34"/>
      </g>
    </g>
  </g>

  <!-- shield outline (white) with pink offset -->
  <path d="M 110 200 L 610 200 L 610 410 L 360 590 L 110 410 Z"
        fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 110 200 L 610 200 L 610 410 L 360 590 L 110 410 Z"
        fill="none" stroke="#EC2C8A" stroke-width="2" stroke-linejoin="round"
        transform="translate(4 4)"/>

  <!-- I letter (teal with pink shadow) — rendered first so T sits in front -->
  <g transform="translate(395 215)">
    <path d="M 14 14 L 152 14 L 152 250 L 14 250 Z" fill="#EC2C8A"/>
    <path d="M 0 0 L 138 0 L 138 236 L 0 236 Z"
          fill="#1FBFC4" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- T letter (white with pink and teal shadow accents) -->
  <g transform="translate(150 175)">
    <path d="M 14 14 L 264 14 L 264 76 L 175 76 L 175 296 L 103 296 L 103 76 L 14 76 Z"
          fill="#EC2C8A"/>
    <path d="M 7 7 L 257 7 L 257 69 L 168 69 L 168 289 L 96 289 L 96 69 L 7 69 Z"
          fill="#1FBFC4"/>
    <path d="M 0 0 L 250 0 L 250 62 L 161 62 L 161 282 L 89 282 L 89 62 L 0 62 Z"
          fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- pink star at the bottom of the shield (home plate marker) -->
  <g transform="translate(360 555)" fill="#EC2C8A">
    <polygon points="0,-18 5,-6 18,-6 8,3 12,17 0,9 -12,17 -8,3 -18,-6 -5,-6"/>
  </g>

  <!-- BASEBALL banner (italicized white text with pink dashes flanking, teal dashes below) -->
  <g transform="translate(360 660)">
    <rect x="-290" y="-8" width="80" height="6" fill="#EC2C8A"/>
    <rect x="210" y="-8" width="80" height="6" fill="#EC2C8A"/>
    <text x="0" y="14" text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="72" font-weight="900" fill="#FFFFFF"
          letter-spacing="4" font-style="italic">BASEBALL</text>
    <rect x="-290" y="24" width="80" height="6" fill="#1FBFC4"/>
    <rect x="210" y="24" width="80" height="6" fill="#1FBFC4"/>
  </g>

  <!-- TEAMS OF IGNORANCE subtitle (italic, pink) -->
  <text x="360" y="697" text-anchor="middle"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="20" fill="#EC2C8A" letter-spacing="5" font-style="italic">TEAMS OF IGNORANCE</text>

  <!-- EST. 2024 home plate badge -->
  <g transform="translate(360 712)">
    <path d="M -16 -7 L 16 -7 L 16 0 L 0 8 L -16 0 Z" fill="none" stroke="#1FBFC4" stroke-width="1.2"/>
    <text x="0" y="-1.5" text-anchor="middle" font-family="Impact, sans-serif" font-size="5" fill="#1FBFC4" letter-spacing="0.6">EST.</text>
    <text x="0" y="4" text-anchor="middle" font-family="Impact, sans-serif" font-size="5" fill="#1FBFC4" letter-spacing="0.6">2024</text>
  </g>
</svg>
