# /etc/nginx/sites-available/tibaseball.conf
#
# Replace DOMAIN_PLACEHOLDER with your real domain in TWO places below.
# The bootstrap script does this for you if you run it.

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;

    # ACME challenges (Let's Encrypt renewal) served over plain HTTP
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS site ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;

    root /var/www/tibaseball;
    index index.html;

    # Certbot manages these paths after you run `certbot --nginx`
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS — turn on after you've confirmed the site is working at HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # gzip the text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/xml
        application/rss+xml;

    # Long cache on static assets, short on HTML
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Disable access logging for the favicon noise
    location = /favicon.ico { log_not_found off; access_log off; }

    # Hide dotfiles
    location ~ /\. { deny all; }
}
